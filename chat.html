  <style>
    .chat-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      padding-top: var(--nav-height);
      max-width: 800px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 32px clamp(16px, 4vw, 32px) 90px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      scroll-behavior: smooth;
      scrollbar-width: none;
    }

    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0);
      border-radius: 4px;
      transition: background 0.3s ease;
    }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages.scrolling::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
    }

    [data-theme="light"] .chat-messages.scrolling::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.12);
    }

    .chat-msg {
      display: flex;
      gap: 12px;
      max-width: 85%;
      animation: chatReveal 0.4s var(--ease-out) forwards;
      opacity: 0;
      transform: translateY(12px);
    }

    @keyframes chatReveal {
      to { opacity: 1; transform: translateY(0); }
    }

    .chat-msg--user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .chat-msg--assistant {
      align-self: flex-start;
    }

    .chat-msg__avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      flex-shrink: 0;
      margin-top: 4px;
    }

    .chat-msg--user .chat-msg__avatar {
      background: var(--accent);
      color: var(--bg-primary);
      font-weight: 600;
    }

    .chat-msg--assistant .chat-msg__avatar {
      background: var(--bg-elevated);
      border: 1px solid var(--glass-border);
      color: var(--text-secondary);
      font-family: var(--font-display);
      font-size: 0.85rem;
    }

    .chat-msg__bubble {
      padding: 14px 18px;
      border-radius: var(--radius);
      line-height: 1.65;
      font-size: 0.92rem;
    }

    .chat-msg--user .chat-msg__bubble {
      background: var(--accent);
      color: var(--bg-primary);
      border-bottom-right-radius: 4px;
      font-weight: 500;
    }

    .chat-msg--assistant .chat-msg__bubble {
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      color: var(--text-primary);
      border-bottom-left-radius: 4px;
      font-weight: 400;
    }

    /* Typewriter cursor — hidden, only structural */
    .chat-msg__bubble .typewriter-cursor {
      display: none;
    }

    /* Typing indicator */
    .chat-typing {
      display: flex;
      gap: 12px;
      align-self: flex-start;
      max-width: 85%;
      animation: chatReveal 0.3s var(--ease-out) forwards;
      opacity: 0;
    }

    .chat-typing__dots {
      padding: 16px 20px;
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .chat-typing__dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: typingBounce 1.4s ease-in-out infinite;
    }

    .chat-typing__dot:nth-child(2) { animation-delay: 0.2s; }
    .chat-typing__dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* Input bar — floating transparent */
    .chat-input-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-width: 800px;
      margin: 0 auto;
      padding: 12px clamp(16px, 4vw, 32px) calc(14px + env(safe-area-inset-bottom, 0px));
      background: transparent;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      z-index: 100;
    }

    .chat-input-bar__input {
      flex: 1;
      background: rgba(17, 17, 17, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 14px 20px;
      font-family: var(--font-body);
      font-size: 0.92rem;
      color: var(--text-primary);
      outline: none;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
    }

    .chat-input-bar__input:focus {
      border-color: var(--accent-soft);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .chat-input-bar__input::-webkit-scrollbar { display: none; }
    .chat-input-bar__input { scrollbar-width: none; }

    .chat-input-bar__input::placeholder {
      color: var(--text-muted);
    }

    .chat-input-bar__send {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--accent);
      color: var(--bg-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all var(--transition-fast);
      border: none;
      cursor: pointer;
    }

    .chat-input-bar__send:hover:not(:disabled) {
      background: #ff8a66;
      transform: scale(1.05);
    }

    .chat-input-bar__send:disabled {
      opacity: 0.4;
    }

    .chat-input-bar__send svg {
      width: 18px;
      height: 18px;
    }

    /* Welcome state */
    .chat-welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      gap: 16px;
      flex: 1;
      min-height: 0;
      margin: auto 0;
    }

    .chat-welcome__icon {
      font-size: 2.5rem;
      margin-bottom: 8px;
    }

    .chat-welcome__title {
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-weight: 500;
    }

    .chat-welcome__desc {
      font-size: 0.95rem;
      color: var(--text-secondary);
      max-width: 400px;
      line-height: 1.7;
    }

    .chat-welcome__suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      align-items: center;
      margin-top: 20px;
      max-width: 500px;
    }

    .chat-welcome__suggestion {
      padding: 10px 20px;
      border: 1px solid var(--accent-glow);
      border-radius: 100px;
      font-size: 0.82rem;
      color: var(--text-secondary);
      background: none;
      transition: all var(--transition-fast);
      font-family: var(--font-body);
      cursor: pointer;
      letter-spacing: 0.01em;
    }

    .chat-welcome__suggestion:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-glow);
    }

    /* Filler text styling */
    .chat-bubble--filler {
      opacity: 0.5;
      font-style: italic;
    }

    /* Inline bouncing dots */
    .chat-dots-inline {
      display: inline-flex;
      gap: 3px;
      align-items: center;
      margin-left: 4px;
      vertical-align: middle;
    }

    .chat-dots-inline__dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--text-muted);
      display: inline-block;
      animation: dotBounce 1.4s ease-in-out infinite;
    }

    .chat-dots-inline__dot:nth-child(2) { animation-delay: 0.2s; }
    .chat-dots-inline__dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dotBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
      30% { transform: translateY(-4px); opacity: 0.9; }
    }

    /* Suggestions bar — now inline in chat flow */
    .chat-suggestions-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      padding: 4px 0 8px 0;
      opacity: 0;
      transform: translateY(8px);
      animation: suggestionsReveal 0.4s var(--ease-out) 0.15s forwards;
    }

    .chat-suggestions-bar .chat-welcome__suggestion {
      font-size: 0.75rem;
      padding: 7px 14px;
      opacity: 0;
      transform: translateY(6px);
      animation: suggestionPop 0.3s var(--ease-out) forwards;
    }

    .chat-suggestions-bar .chat-welcome__suggestion:nth-child(1) { animation-delay: 0.2s; }
    .chat-suggestions-bar .chat-welcome__suggestion:nth-child(2) { animation-delay: 0.3s; }
    .chat-suggestions-bar .chat-welcome__suggestion:nth-child(3) { animation-delay: 0.4s; }
    .chat-suggestions-bar .chat-welcome__suggestion:nth-child(4) { animation-delay: 0.5s; }

    @keyframes suggestionsReveal {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes suggestionPop {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Clear chat button — inline with send */
    .chat-clear-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgba(17, 17, 17, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .chat-clear-btn:hover {
      border-color: #e54;
      color: #e54;
      background: rgba(238, 85, 68, 0.08);
    }

    .chat-clear-btn svg {
      width: 16px;
      height: 16px;
    }

    @media (max-width: 768px) {
      .chat-msg { max-width: 92%; }
      .chat-clear-btn { width: 38px; height: 38px; }
      .chat-welcome { padding: 24px 16px; }
      .chat-welcome__icon { font-size: 2rem; }
      .chat-welcome__title { font-size: 1.4rem; }
      .chat-welcome__desc { font-size: 0.88rem; }
      .chat-welcome__suggestions { gap: 8px; max-width: 100%; }
      .chat-welcome__suggestion { font-size: 0.78rem; padding: 8px 14px; }
      .chat-input-bar { padding: 8px 8px calc(10px + env(safe-area-inset-bottom, 0px)); gap: 6px; max-width: 100%; }
      .chat-input-bar__input { padding: 12px 14px; font-size: 16px; }
      .chat-input-bar__send { width: 38px; height: 38px; }
      .chat-msg__bubble { padding: 12px 14px; font-size: 0.88rem; }
      .chat-msg__avatar { width: 28px; height: 28px; font-size: 0.65rem; }
    }

    @media (max-width: 360px) {
      .chat-welcome__title { font-size: 1.2rem; }
      .chat-welcome__suggestion { font-size: 0.72rem; padding: 7px 12px; }
    }

    /* Light theme chat overrides */
    [data-theme="light"] .chat-input-bar__input {
      background: rgba(255, 255, 255, 0.9);
      border-color: rgba(0, 0, 0, 0.1);
    }

    [data-theme="light"] .chat-input-bar__input:focus {
      border-color: var(--accent-soft);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    [data-theme="light"] .chat-clear-btn {
      background: rgba(255, 255, 255, 0.9);
      border-color: rgba(0, 0, 0, 0.1);
    }

    [data-theme="light"] .chat-msg--user .chat-msg__bubble {
      background: var(--accent);
      color: #fff;
    }

    [data-theme="light"] .chat-msg--assistant .chat-msg__bubble {
      background: var(--bg-card);
      border-color: var(--glass-border);
    }

    [data-theme="light"] .chat-msg--user .chat-msg__avatar {
      background: var(--accent);
      color: #fff;
    }

    [data-theme="light"] .chat-msg--assistant .chat-msg__avatar {
      background: var(--bg-primary);
      border-color: rgba(0, 0, 0, 0.1);
      color: var(--text-primary);
    }

    [data-theme="light"] .chat-dots-inline__dot {
      background: var(--accent);
    }

    [data-theme="light"] .chat-bubble--filler {
      opacity: 0.6;
    }

    [data-theme="light"] .chat-welcome__icon {
      color: var(--accent);
    }
  </style>
</head>
