# ─────────────────────────────────────────────────────────────────────
# Nginx config for hunarkaur.in — optimized for 1GB RAM / 1 CPU VM
# ─────────────────────────────────────────────────────────────────────

user www-data;
worker_processes 1;
worker_rlimit_nofile 2048;
pid /run/nginx.pid;

events {
    worker_connections 512;
    multi_accept on;
    use epoll;
}

http {
    # ── Basic settings ───────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    types_hash_max_size 2048;
    server_tokens off;

    # ── Timeouts (aggressive for low-resource VM) ────────────────────
    keepalive_timeout 30;
    keepalive_requests 100;
    client_body_timeout 10;
    client_header_timeout 10;
    send_timeout 10;
    reset_timedout_connection on;

    # ── Buffer sizes (minimal for 1GB RAM) ───────────────────────────
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    client_max_body_size 64k;
    large_client_header_buffers 2 1k;

    # ── MIME types ───────────────────────────────────────────────────
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging (minimal for performance) ────────────────────────────
    access_log /var/log/nginx/access.log combined buffer=16k flush=5s;
    error_log /var/log/nginx/error.log warn;

    # ── Gzip compression ────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── Rate limiting zones ──────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=general:2m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:2m rate=5r/s;
    limit_conn_zone $binary_remote_addr zone=connlimit:2m;

    # ── Upstream (Node.js app) ───────────────────────────────────────
    upstream node_app {
        server 127.0.0.1:3000;
        keepalive 4;
    }

    # ── HTTP → HTTPS redirect ────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name hunarkaur.in www.hunarkaur.in;
        return 301 https://hunarkaur.in$request_uri;
    }

    # ── www → non-www redirect ───────────────────────────────────────
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name www.hunarkaur.in;

        ssl_certificate /etc/ssl/certs/hunarkaur.in.pem;
        ssl_certificate_key /etc/ssl/private/hunarkaur.in.key;

        return 301 https://hunarkaur.in$request_uri;
    }

    # ── Main server block ────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name hunarkaur.in;

        # ── SSL (Cloudflare Full Strict) ─────────────────────────────
        ssl_certificate /etc/ssl/certs/hunarkaur.in.pem;
        ssl_certificate_key /etc/ssl/private/hunarkaur.in.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:2m;
        ssl_session_timeout 1h;
        ssl_session_tickets on;

        # ── Security headers ─────────────────────────────────────────
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ── Connection limits ────────────────────────────────────────
        limit_conn connlimit 20;

        # ── Static files served directly by nginx ────────────────────
        root /var/www/hunarkaur.in;

        # CSS & JS — long cache
        location ~* \.(css|js)$ {
            limit_req zone=general burst=20 nodelay;
            expires 7d;
            add_header Cache-Control "public, immutable";
            try_files $uri @node;
        }

        # Fonts — long cache
        location ~* \.(woff2?|ttf|eot|otf)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            try_files $uri @node;
        }

        # Images & SVGs
        location ~* \.(png|jpg|jpeg|gif|webp|avif|ico|svg)$ {
            expires 30d;
            add_header Cache-Control "public";
            try_files $uri @node;
        }

        # HTML pages — no cache, always fresh
        location ~* \.html$ {
            limit_req zone=general burst=10 nodelay;
            add_header Cache-Control "no-cache, must-revalidate";
            try_files $uri @node;
        }

        # Root — serve index.html
        location = / {
            limit_req zone=general burst=10 nodelay;
            add_header Cache-Control "no-cache, must-revalidate";
            try_files /index.html @node;
        }

        # API routes — proxy to Node.js with rate limiting
        location /api/ {
            limit_req zone=api burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://node_app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts for LLM API calls (can be slow)
            proxy_read_timeout 45s;
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;

            # No buffering for API responses
            proxy_buffering off;
        }

        # Health check
        location = /health {
            proxy_pass http://node_app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;
        }

        # Fallback to Node.js
        location @node {
            proxy_pass http://node_app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Block hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Block env files
        location ~* \.env {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
